spring.application.name=mvp

 # Banco H2 com senha obrigatoria via ambiente (ou definida no profile de Dev)
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=${DB_PLATFORM}

spring.h2.console.enabled=true

#Keys
api.security.token.secret=${JWT_KEY}
api.security.db.encryption.key=${DB_ENCRYPTION_KEY}
api.security.db.encryption.salt=${DB_ENCRYPTION_SALT}

#Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#SSL
server.port=${SERVER_PORT}
server.ssl.key-store-type=${STORE_TYPE}
server.ssl.key-store=${KEY_STORE}
server.ssl.key-store-password=${SSL_PASSWORD}
server.ssl.key-alias=mvp-investimentos